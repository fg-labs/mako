name: Backfill Release Binaries

# Manually rebuild and upload binary tarballs for an already-published
# release. Use this when a release's `binaries` matrix in publish.yml
# failed and left tarballs missing from the GitHub release.
#
# The job is idempotent: it builds all four targets but only uploads
# assets that are not already present on the tag, so it is safe to
# re-run.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to backfill (no leading v), e.g. 0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  binaries:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.FG_LABS_BOT_APP_ID }}
          private-key: ${{ secrets.FG_LABS_BOT_PRIVATE_KEY }}
      - name: Checkout tagged source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: v${{ inputs.version }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Read pinned Rust channel
        id: rust-channel
        run: |
          CHANNEL=$(awk -F'"' '/^channel/ {print $2}' rust-toolchain.toml)
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ steps.rust-channel.outputs.channel }}
          targets: ${{ matrix.target }}
      - name: Install cross-compiler (linux-gnu only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          {
            echo "[target.aarch64-unknown-linux-gnu]"
            echo "linker = \"aarch64-linux-gnu-gcc\""
          } >> .cargo/config.toml
      - name: Skip if asset already present
        id: check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ inputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          ASSET="mako-${VERSION}-${TARGET}.tar.gz"
          if gh release view "$TAG" --json assets --jq '.assets[].name' \
            | grep -Fxq "$ASSET"; then
            echo "$ASSET already present on $TAG — skipping build and upload"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build release binary
        if: steps.check.outputs.skip == 'false'
        run: cargo build --release --target ${{ matrix.target }} --locked
      - name: Package tarball
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION: ${{ inputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          STAGE=$(mktemp -d)
          BIN_NAME="mako-${VERSION}-${TARGET}"
          mkdir "${STAGE}/${BIN_NAME}"
          cp "target/${TARGET}/release/mako" "${STAGE}/${BIN_NAME}/"
          cp README.md LICENSE CHANGELOG.md "${STAGE}/${BIN_NAME}/"
          tar -C "${STAGE}" -czf "${BIN_NAME}.tar.gz" "${BIN_NAME}"
          shasum -a 256 "${BIN_NAME}.tar.gz" > "${BIN_NAME}.tar.gz.sha256"
      - name: Upload to release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ inputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          gh release upload "v${VERSION}" \
            "mako-${VERSION}-${TARGET}.tar.gz" \
            "mako-${VERSION}-${TARGET}.tar.gz.sha256"
