name: Manage Release PRs and Publish

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Create or update release PR
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    outputs:
      version: ${{ steps.publish.outputs.version }}
      published: ${{ steps.publish.outputs.published }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Authenticate to crates.io via Trusted Publishing
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
      - name: Publish if needed
        id: publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: |
          set -euo pipefail
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r \
            '.packages[] | select(.name == "fg-mako") | .version')
          PUBLISHED_VERSION=$(curl -sS \
            -H "User-Agent: fg-mako-ci (https://github.com/fg-labs/mako)" \
            "https://crates.io/api/v1/crates/fg-mako" | jq -r \
            '.crate.max_version // "0.0.0"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "fg-mako v$VERSION already published — skipping"
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Publishing fg-mako v$VERSION..."
          cargo publish
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.publish.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.publish.outputs.version }}"
          TAG="v${VERSION}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
          fi
          if ! git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            git push origin "$TAG"
          fi
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "v${VERSION}" \
              --generate-notes \
              --latest
          fi

  binaries:
    needs: publish
    if: needs.publish.outputs.published == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: v${{ needs.publish.outputs.version }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compiler (linux-gnu only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          {
            echo "[target.aarch64-unknown-linux-gnu]"
            echo "linker = \"aarch64-linux-gnu-gcc\""
          } >> .cargo/config.toml
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --locked
      - name: Package tarball
        env:
          VERSION: ${{ needs.publish.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          STAGE=$(mktemp -d)
          BIN_NAME="mako-${VERSION}-${TARGET}"
          mkdir "${STAGE}/${BIN_NAME}"
          cp "target/${TARGET}/release/mako" "${STAGE}/${BIN_NAME}/"
          cp README.md LICENSE CHANGELOG.md "${STAGE}/${BIN_NAME}/"
          tar -C "${STAGE}" -czf "${BIN_NAME}.tar.gz" "${BIN_NAME}"
          shasum -a 256 "${BIN_NAME}.tar.gz" > "${BIN_NAME}.tar.gz.sha256"
      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.publish.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          gh release upload "v${VERSION}" \
            "mako-${VERSION}-${TARGET}.tar.gz" \
            "mako-${VERSION}-${TARGET}.tar.gz.sha256" \
            --clobber
